<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Body Pass — Idées pour vous</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500&family=Source+Sans+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream-deep: #F2EBDF; --cream-light: #FBF7F1;
    --burgundy: #A3695B; --text-warm: #54504E; --title: #2C2826; --border: #E5DBC8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans Pro', sans-serif; background: var(--cream-light);
    color: var(--text-warm); min-height: 100vh; padding: 80px 24px;
    -webkit-font-smoothing: antialiased;
  }
  .state-screen {
    max-width: 540px; margin: 0 auto; text-align: center;
    background: var(--cream-deep); border: 1px solid var(--border); padding: 80px 40px;
  }
  .eyebrow {
    text-transform: uppercase; letter-spacing: 0.22em; font-size: 11px;
    color: var(--burgundy); font-weight: 600; margin-bottom: 18px;
  }
  h2 {
    font-family: 'Playfair Display', Georgia, serif; color: var(--title);
    font-size: 30px; font-weight: 400; font-style: italic; margin-bottom: 16px;
  }
  p { font-size: 16px; color: var(--text-warm); line-height: 1.65; }
  a { color: var(--burgundy); }
</style>
</head>
<body>
  <div class="state-screen">
    <div class="eyebrow">Body Pass</div>
    <h2>Bientôt à votre attention</h2>
    <p>Cette page vous présentera prochainement des suggestions d'établissements choisis selon vos goûts.</p>
    <p style="margin-top: 20px;">D'ici là, retrouvez tous nos partenaires sur <a href="https://www.bodypass.ch">bodypass.ch</a>.</p>
  </div>
</body>
</html>
